services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tagflow:tagflow@postgres:5432/tagflow
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tagflow
      POSTGRES_PASSWORD: tagflow
      POSTGRES_DB: tagflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  pgdata:
  ollama_models:
